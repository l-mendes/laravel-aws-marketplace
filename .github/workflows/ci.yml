name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, to catch PHP/dependency drift and new advisories on a quiet repo.
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }}, ${{ matrix.dependencies }} deps)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        dependencies: ['lowest', 'highest']
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.dependencies }}

      - name: Run tests
        run: composer test

  quality:
    name: Static analysis & code style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: highest

      - name: Static analysis (Larastan)
        run: composer analyse

      - name: Code style (Pint)
        run: composer lint

      - name: Security audit
        run: composer audit
